<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Dewaru Jewellers</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

<!-- Login Form -->
<div class="flex items-center justify-center min-h-screen bg-gradient-to-r from-yellow-500 to-yellow-600">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
        <h2 class="text-3xl font-bold text-center text-yellow-800 mb-6">Welcome Back!</h2>

        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="mb-4">
                <label for="username" class="block text-sm font-medium text-gray-700">Username or Email</label>
                <input type="text" id="username" name="username" class="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-yellow-500 focus:border-yellow-500 text-lg" required>
            </div>

            <div class="mb-6">
                <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
                <input type="password" id="password" name="password" class="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-yellow-500 focus:border-yellow-500 text-lg" required>
            </div>

            <div class="flex justify-between items-center">
                <button type="submit" class="w-full bg-yellow-600 hover:bg-yellow-700 text-white font-semibold py-3 px-4 rounded-xl focus:outline-none">Login</button>
                <a href="{% url 'forgot_password' %}" class="text-sm text-yellow-800 hover:text-yellow-600">Forgot password?</a>
            </div>
        </form>

        <p class="mt-6 text-center text-sm text-gray-600">Don't have an account? <a href="{% url 'register' %}" class="text-yellow-600 hover:text-yellow-500">Sign up</a></p>
    </div>
</div>

</body>
</html>
