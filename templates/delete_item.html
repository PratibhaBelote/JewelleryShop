<!-- delete_item.html -->
{% extends 'add_item.html' %}

{% block content %}
  <h2>Are you sure you want to delete {{ item.name }}?</h2>
  <form method="POST">
    {% csrf_token %}
    <button type="submit" class="bg-red-500 text-white font-bold py-2 px-6 rounded">Yes, Delete</button>
  </form>
  <a href="{% url 'home' %}" class="bg-gray-500 text-white font-semibold py-2 px-4 rounded">Cancel</a>
{% endblock %}
